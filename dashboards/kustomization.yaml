apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: monitoring

generatorOptions:
  disableNameSuffixHash: true
  labels:
    app.kubernetes.io/instance: prometheus
    app.kubernetes.io/managed-by: grafana-config
    app.kubernetes.io/part-of: kube-prometheus-stack
    grafana_dashboard: "1"
    release: prometheus

configMapGenerator:
  - name: grafana-dashboard-kubernetes-quick-glance
    files:
      - kubernetes-quick-glance.json
  - name: grafana-dashboard-kubernetes-pod-health-jsonnet
    files:
      - kubernetes-pod-health-jsonnet.json
